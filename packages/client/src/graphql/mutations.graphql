mutation Login($name: String!, $password: String!) {
  login(name: $name, password: $password) {
    token
    user {
      id
      name
    }
  }
}

mutation Register($name: String!, $password: String!) {
  register(name: $name, password: $password) {
    token
    user {
      id
      name
    }
  }
}

mutation AddPoints($userId: ID!, $amount: Int!) {
  addPoints(userId: $userId, amount: $amount) 
}

mutation OpenCrate($userId: ID!, $crateId: ID!){
  openCrate(userId: $userId, crateId: $crateId){
    id
    name
    rarity
  }
}