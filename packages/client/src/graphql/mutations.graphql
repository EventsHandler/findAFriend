mutation Login($name: String!, $password: String!) {
  login(name: $name, password: $password) {
    token
    user {
      id
      name
    }
  }
}

mutation Register($name: String!, $password: String!) {
  register(name: $name, password: $password) {
    token
    user {
      id
      name
    }
  }
}

mutation AddPoints($userId: ID!, $amount: Int!) {
  addPoints(userId: $userId, amount: $amount)
}

mutation OpenCrate($userId: ID!, $crateId: ID!) {
  openCrate(userId: $userId, crateId: $crateId) {
    id
    name
    rarity
    svgId
  }
}

mutation BuyCrate($userId: ID!, $crateId: ID!, $quantity: Int!) {
  buyCrate(userId: $userId, crateId: $crateId, quantity: $quantity)
}

mutation JoinRoom($locationId: ID!) {
  joinRoom(locationId: $locationId) {
    id
    name
    locationId
    posx
    posy
    points
  }
}

mutation LeaveRoom {
  leaveRoom {
    id
    name
    locationId
    posx
    posy
    points
  }
}

mutation UpdatePosition($locationId: ID!, $lat: Float!, $lng: Float!) {
  updatePosition(locationId: $locationId, lat: $lat, lng: $lng) {
    id
    locationId
    posx
    posy
    points
  }
}

mutation ClaimMission($missionId: ID!) {
  claimMission(missionId: $missionId) {
    id
    progress
    status
    lockedUntil
    mission {
      id
      title
      rewardXp
      targetProgress
      completionKind
      distanceMeters
      staySeconds
      timerSeconds
      repeatable
      cooldownHours
    }
  }
}

mutation UpdateMissionProgress($userMissionId: ID!, $progress: Int!) {
  updateMissionProgress(userMissionId: $userMissionId, progress: $progress) {
    id
    progress
    status
    lockedUntil
    mission {
      id
      rewardXp
      targetProgress
