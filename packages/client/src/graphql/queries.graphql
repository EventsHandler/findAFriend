query Locations {
  locations {
    id
    name
    posx
    posy
  }
}

query Me {
  me {
    id
    name
    locationId
    posx
    posy
    points
  }
}

query LocationUsers($locationId: ID!) {
  locationUsers(locationId: $locationId) {
    id
    name
    posx
    posy
    locationId
  }
}

mutation JoinRoom($locationId: ID!) {
  joinRoom(locationId: $locationId) {
    id
    name
    locationId
    posx
    posy
  }
}

mutation LeaveRoom {
  leaveRoom {
    id
    name
    locationId
    posx
    posy
  }
}

mutation UpdatePosition($locationId: ID!, $lat: Float!, $lng: Float!) {
  updatePosition(locationId: $locationId, lat: $lat, lng: $lng) {
    id
    locationId
    posx
    posy
    points
  }
}

query Crates {
  crates{
    id
    name
    price
    rarity
  }
}