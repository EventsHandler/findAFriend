query Locations {
  locations {
    id
    name
    posx
    posy
  }
}

query Me {
  me {
    id
    name
    locationId
    posx
    posy
    points
  }
}

query LocationUsers($locationId: ID!) {
  locationUsers(locationId: $locationId) {
    id
    name
    posx
    posy
    locationId
    points
  }
}

query Crates {
  crates{
    id
    name
    price
    rarity
  }
}