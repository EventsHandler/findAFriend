query Locations {
  locations {
    id
    name
    posx
    posy
  }
}

query Me {
  me {
    id
    name
    xp
    level
    locationId
    posx
    posy
    points
    profileDescription
    profileTags
    userMissions {
      id
      progress
      status
      startedAt
      lockedUntil
      mission {
        id
        title
        description
        rewardXp
        targetProgress
        completionKind
        distanceMeters
        staySeconds
        timerSeconds
        repeatable
        cooldownHours
      }
    }
    questHistory(limit: 40) {
      id
      missionId
      title
      rewardXp
      completedAt
    }
  }
}

query Missions($locationId: ID) {
  missions(locationId: $locationId) {
    id
    title
    description
    rewardXp
    targetProgress
    completionKind
    distanceMeters
    staySeconds
    timerSeconds
    repeatable
    cooldownHours
    locationId
  }
}

query LocationUsers($locationId: ID!) {
  locationUsers(locationId: $locationId) {
    id
    name
    posx
    posy
    locationId
    points
  }
}

query Crates {
  crates {
    id
    name
    price
    rarity
  }
}

query CurrentUser {
  me {
    id
    name
    locationId
    posx
    posy
    points
    crateInventories {
      crate {
        rarity
        name
      }
      quantity
      crateId
      userId
    }
    inventories {
      item {
        id
        name
        svgId
        rarity
      }
      quantity
    }
  }
}

query GetBadges {
  items {
    id
    name
    rarity
    svgId
  }
}
