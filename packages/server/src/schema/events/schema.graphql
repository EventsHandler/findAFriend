enum RarityType {
  COMMON
  EPIC
  LEGENDARY
}

type User {
  id: ID!
  name: String!
  posx: Float
  posy: Float
  locationId: ID

  inventories: [ItemInventory!]
  crateInventories: [CrateInventory!]
}

type Location {
  id: ID!
  name: String!
  posx: Float!
  posy: Float!
}

type Crate {
  id: ID!
  name: String!
  rarity: RarityType!
  chance: Float!

  rarityDrops: [CrateRarityDrop!]
}

type CrateRarityDrop {
  id: ID!
  rarity: RarityType!
  chance: Float!

  crate: Crate
}

type Item {
  id: ID!
  name: String!
  rarity: RarityType!
}

type CrateInventory {
  id: ID!
  quantity: Int!

  user: User
  crate: Crate
}

type ItemInventory {
  id: ID!
  quantity: Int!

  user: User
  item: Item
}

type AuthPayload {
  token: String!
  user: User!
}

extend type Query {
  locations: [Location!]!
  me: User
  locationUsers(locationId: ID!): [User!]!

  crates: [Crate!]!
  crate(id: ID!): Crate

  items: [Item!]!
  item(id: ID!): Item

  userItems(userId: ID!): [ItemInventory!]!
  userCrates(userId: ID!): [CrateInventory!]!
}

extend type Mutation {
  login(name: String!, password: String!): AuthPayload!
  register(name: String!, password: String!): AuthPayload!

  buyCrate(userId: ID!, crateId: ID!, quantity: Int!): Boolean!

  openCrate(userId: ID!, crateId: ID!): Item!
  joinRoom(locationId: ID!): User!
  leaveRoom: User!
  updatePosition(locationId: ID!, lat: Float!, lng: Float!): User!
  locations: [Location!]
}
