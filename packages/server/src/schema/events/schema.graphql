enum RarityType {
  COMMON
  EPIC
  LEGENDARY
}

enum UserMissionStatus {
  ACTIVE
  COMPLETED
}

enum MissionCompletionKind {
  MANUAL_CONFIRM
  WALK_DISTANCE
  STAY_TIME
  CHAT_COUNT
  PHOTO
  TIMED
}

type Mission {
  id: ID!
  title: String!
  description: String
  rewardXp: Int!
  targetProgress: Int!
  completionKind: MissionCompletionKind!
  distanceMeters: Int
  staySeconds: Int
  timerSeconds: Int
  repeatable: Boolean!
  cooldownHours: Int!
  locationId: ID
  location: Location
}

type UserMission {
  id: ID!
  userId: ID!
  missionId: ID!
  progress: Int!
  status: UserMissionStatus!
  lockedUntil: String
  startedAt: String
  mission: Mission!
}

type QuestCompletion {
  id: ID!
  userId: ID!
  missionId: ID!
  title: String!
  rewardXp: Int!
  completedAt: String!
  mission: Mission
}

type User {
  id: ID!
  name: String!
  xp: Int!
  level: Int!
  posx: Float
  posy: Float
  locationId: ID

  points: Int!
  inventories: [ItemInventory!]
  crateInventories: [CrateInventory!]
  userMissions: [UserMission!]!
  questHistory(limit: Int = 40): [QuestCompletion!]!
}

type Location {
  id: ID!
  name: String!
  posx: Float!
  posy: Float!
  tag: LocationTag!
}

enum LocationTag {
  PARK
  RESTAURANT
  LANDMARK
}

type Crate {
  id: ID!
  name: String!
  rarity: RarityType!
  chance: Float!
  price: Int!
  rarityDrops: [CrateRarityDrop!]
}

type CrateRarityDrop {
  id: ID!
  rarity: RarityType!
  chance: Float!
  crateId: String!

  crate: Crate
}

type Item {
  id: ID!
  name: String!
  rarity: RarityType!
  svgId: String!
}

type CrateInventory {
  id: ID!
  quantity: Int!
  userId: String!
  crateId: String!

  user: User
  crate: Crate
}

type ItemInventory {
  id: ID!
  quantity: Int!
  userId: String!
  itemId: String!

  user: User
  item: Item
}

type AuthPayload {
  token: String!
  user: User!
}

extend type Query {
  locations: [Location!]!
  missions(locationId: ID): [Mission!]!
  me: User
  locationUsers(locationId: ID!): [User!]!

  crates: [Crate!]!
  crate(id: ID!): Crate

  items: [Item!]!
  item(id: ID!): Item

  userItems(userId: ID!): [ItemInventory!]!
  userCrate(userId: ID!, crateId: ID!): CrateInventory!
  userCrates(userId: ID!): [CrateInventory!]!
}

extend type Mutation {
  login(name: String!, password: String!): AuthPayload!
  register(name: String!, password: String!): AuthPayload!

  buyCrate(userId: ID!, crateId: ID!, quantity: Int!): Boolean!

  openCrate(userId: ID!, crateId: ID!): Item!
  joinRoom(locationId: ID!): User!
  leaveRoom: User!
  updatePosition(locationId: ID!, lat: Float!, lng: Float!): User!
  locations: [Location!]

  addPoints(userId: ID!, amount: Int!): Boolean!
  claimMission(missionId: ID!): UserMission!
  updateMissionProgress(userMissionId: ID!, progress: Int!): UserMission!
  completePhotoMission(missionId: ID!, lat: Float!, lng: Float!): UserMission!
  completeMission(missionId: ID!, lat: Float!, lng: Float!): UserMission!
  startTimedMission(missionId: ID!, lat: Float!, lng: Float!): UserMission!
}
