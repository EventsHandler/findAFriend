type Event {
  id: ID!
  name: String!
  derived: String!
}

type User {
  id: ID!
  name: String!
}

type Location {
  id: ID!
  name: String!
  posx: Float!
  posy: Float!
}

type AuthPayload {
  token: String!
  user: User!
}

extend type Query {
  events(filter: String): [Event!]!
  locations: [Location!]!
  me: User
}

extend type Mutation {
  createEvent(name: String!): Event!
  login(name: String!, password: String!): AuthPayload!
  register(name: String!, password: String!): AuthPayload!
}
