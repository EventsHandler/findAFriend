type Event {
  id: ID!
  name: String!
  derived: String!
}

type User {
  id: ID!
  name: String!
}

type Location {
  id: ID!
  name: String!
  posx: Float!
  posy: Float!
}

extend type Query {
  events(filter: String): [Event!]!
  locations: [Location!]!
}

extend type Mutation {
  createEvent(name: String!): Event!
}
